<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- V4b: Globe avec continents + pin France -->

  <!-- Fond bleu ocean -->
  <circle cx="100" cy="100" r="92" fill="#2563EB"/>

  <!-- Grille méridiens/parallèles subtile -->
  <ellipse cx="100" cy="100" rx="55" ry="92" stroke="white" stroke-width="0.5" opacity="0.1" fill="none"/>
  <ellipse cx="100" cy="100" rx="25" ry="92" stroke="white" stroke-width="0.5" opacity="0.08" fill="none"/>
  <ellipse cx="100" cy="100" rx="80" ry="92" stroke="white" stroke-width="0.5" opacity="0.08" fill="none"/>
  <line x1="8" y1="60" x2="192" y2="60" stroke="white" stroke-width="0.4" opacity="0.08"/>
  <line x1="8" y1="100" x2="192" y2="100" stroke="white" stroke-width="0.4" opacity="0.1"/>
  <line x1="8" y1="140" x2="192" y2="140" stroke="white" stroke-width="0.4" opacity="0.08"/>

  <!-- Europe (centré sur la France) -->
  <!-- Scandinavie -->
  <path d="M108 28 L112 24 L115 28 L118 22 L122 26 L120 34 L116 38 L112 36 L108 32Z" fill="white" opacity="0.25"/>
  <!-- Iles britanniques -->
  <path d="M88 38 L92 34 L95 36 L96 42 L92 46 L88 44Z" fill="white" opacity="0.25"/>
  <path d="M84 42 L86 40 L88 42 L86 46Z" fill="white" opacity="0.25"/>
  <!-- France + Benelux + Allemagne -->
  <path d="M98 42 L106 40 L114 42 L118 46 L120 52 L116 56 L110 58 L106 62 L100 64 L96 60 L92 56 L94 50 L96 46Z" fill="white" opacity="0.3"/>
  <!-- Péninsule ibérique -->
  <path d="M84 58 L92 56 L96 60 L96 66 L92 72 L86 74 L80 70 L78 64 L80 60Z" fill="white" opacity="0.25"/>
  <!-- Italie -->
  <path d="M110 58 L114 62 L116 68 L118 74 L116 78 L112 76 L110 70 L108 64Z" fill="white" opacity="0.25"/>
  <!-- Botte + Sicile -->
  <path d="M114 78 L116 80 L114 82Z" fill="white" opacity="0.2"/>
  <!-- Balkans / Grèce -->
  <path d="M120 56 L128 54 L134 58 L132 66 L128 70 L124 68 L120 62Z" fill="white" opacity="0.25"/>
  <path d="M124 72 L126 76 L124 78 L122 76Z" fill="white" opacity="0.2"/>
  <!-- Europe de l'Est / Russie -->
  <path d="M122 26 L130 24 L142 28 L150 34 L152 42 L148 50 L140 54 L134 58 L128 54 L120 52 L118 46 L114 42 L118 36 L120 34Z" fill="white" opacity="0.2"/>

  <!-- Afrique -->
  <path d="M86 82 L92 78 L100 76 L110 78 L120 80 L130 78 L136 84 L140 94 L142 106 L140 118 L136 128 L128 138 L120 144 L112 148 L104 146 L96 140 L90 132 L86 120 L82 108 L80 96 L82 88Z" fill="white" opacity="0.2"/>
  <!-- Madagascar -->
  <path d="M142 126 L144 122 L146 128 L144 132Z" fill="white" opacity="0.15"/>

  <!-- Moyen-Orient -->
  <path d="M136 58 L144 54 L152 58 L156 66 L152 72 L146 74 L140 70 L136 64Z" fill="white" opacity="0.2"/>
  <!-- Péninsule arabique -->
  <path d="M140 74 L150 72 L158 78 L156 88 L148 92 L140 90 L136 84Z" fill="white" opacity="0.18"/>

  <!-- Amérique du Sud (bord gauche, partiellement visible) -->
  <path d="M28 96 L34 88 L40 86 L46 90 L48 98 L50 110 L46 122 L40 132 L34 140 L28 144 L22 138 L18 126 L16 114 L18 104 L22 98Z" fill="white" opacity="0.15"/>

  <!-- Amérique du Nord (coin haut gauche) -->
  <path d="M12 56 L18 48 L26 42 L34 40 L42 42 L50 46 L54 52 L52 58 L48 64 L42 68 L36 72 L30 74 L22 72 L16 66 L12 60Z" fill="white" opacity="0.15"/>
  <!-- Groenland -->
  <path d="M52 20 L58 16 L66 18 L68 24 L64 30 L58 32 L52 28Z" fill="white" opacity="0.12"/>

  <!-- Orbite satellite -->
  <ellipse cx="100" cy="100" rx="88" ry="32" stroke="#93C5FD" stroke-width="1" opacity="0.35" fill="none" transform="rotate(-20 100 100)"/>

  <!-- MG au centre -->
  <text x="100" y="116" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="60" fill="white" text-anchor="middle" letter-spacing="-2" opacity="0.92">MG</text>

  <!-- Geo Pin sur la France -->
  <path d="M98 44 C98 38, 90 34, 86 40 C82 34, 74 38, 74 44 C74 52, 86 60, 86 60 C86 60, 98 52, 98 44Z" fill="#F59E0B" opacity="0.9"/>
  <circle cx="86" cy="43" r="3.5" fill="white" opacity="0.9"/>
</svg>
