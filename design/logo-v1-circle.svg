<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- V1: Cercle bleu avec MG bold + grille géo -->
  <circle cx="100" cy="100" r="96" fill="#2563EB"/>

  <!-- Grille géomatique subtile -->
  <ellipse cx="100" cy="100" rx="70" ry="70" stroke="white" stroke-width="0.6" opacity="0.15" fill="none"/>
  <ellipse cx="100" cy="100" rx="45" ry="70" stroke="white" stroke-width="0.6" opacity="0.12" fill="none"/>
  <line x1="30" y1="100" x2="170" y2="100" stroke="white" stroke-width="0.6" opacity="0.12"/>
  <line x1="100" y1="30" x2="100" y2="170" stroke="white" stroke-width="0.6" opacity="0.12"/>

  <!-- MG lettres -->
  <text x="100" y="118" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="72" fill="white" text-anchor="middle" letter-spacing="-3">MG</text>

  <!-- Pin marker accent -->
  <circle cx="160" cy="48" r="6" fill="#93C5FD"/>
  <circle cx="160" cy="48" r="2.5" fill="white"/>
</svg>
