<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- V4: Globe stylisé avec MG intégré -->
  <circle cx="100" cy="100" r="92" fill="#2563EB"/>

  <!-- Globe méridiens et parallèles -->
  <ellipse cx="100" cy="100" rx="92" ry="92" stroke="white" stroke-width="1.2" opacity="0.2" fill="none"/>
  <ellipse cx="100" cy="100" rx="55" ry="92" stroke="white" stroke-width="0.8" opacity="0.15" fill="none"/>
  <ellipse cx="100" cy="100" rx="25" ry="92" stroke="white" stroke-width="0.8" opacity="0.1" fill="none"/>
  <line x1="8" y1="65" x2="192" y2="65" stroke="white" stroke-width="0.8" opacity="0.12"/>
  <line x1="8" y1="100" x2="192" y2="100" stroke="white" stroke-width="0.8" opacity="0.15"/>
  <line x1="8" y1="135" x2="192" y2="135" stroke="white" stroke-width="0.8" opacity="0.12"/>

  <!-- MG au centre, bold -->
  <text x="100" y="116" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="64" fill="white" text-anchor="middle" letter-spacing="-2" opacity="0.95">MG</text>

  <!-- Satellite/orbite accent -->
  <ellipse cx="100" cy="100" rx="88" ry="35" stroke="#93C5FD" stroke-width="1.2" opacity="0.4" fill="none" transform="rotate(-25 100 100)"/>
  <circle cx="170" cy="62" r="5" fill="#93C5FD"/>
  <circle cx="170" cy="62" r="2" fill="white"/>
</svg>
