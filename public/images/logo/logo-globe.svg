<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480">
  <defs>
    <linearGradient id="grad-mg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <clipPath id="globe-clip">
      <circle cx="200" cy="195" r="183"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="195" r="190" fill="#1e3a5f"/>
  <!-- Inner circle -->
  <circle cx="200" cy="195" r="185" fill="#162d4a"/>
  <!-- Border circle -->
  <circle cx="200" cy="195" r="185" fill="none" stroke="#3b6a9b" stroke-width="1.5" opacity="0.5"/>

  <!-- Globe grid (simplified latitude/longitude lines) -->
  <g clip-path="url(#globe-clip)" fill="none" stroke="#3b6a9b" stroke-width="0.8" opacity="0.35">
    <!-- Latitude lines -->
    <ellipse cx="200" cy="115" rx="150" ry="12"/>
    <ellipse cx="200" cy="155" rx="168" ry="15"/>
    <ellipse cx="200" cy="195" rx="183" ry="18"/>
    <ellipse cx="200" cy="235" rx="168" ry="15"/>
    <ellipse cx="200" cy="275" rx="150" ry="12"/>

    <!-- Longitude lines -->
    <ellipse cx="200" cy="195" rx="40" ry="183"/>
    <ellipse cx="200" cy="195" rx="90" ry="183"/>
    <ellipse cx="200" cy="195" rx="140" ry="183"/>
    <!-- Tilted longitude lines for depth -->
    <ellipse cx="200" cy="195" rx="70" ry="183" transform="rotate(25 200 195)"/>
    <ellipse cx="200" cy="195" rx="70" ry="183" transform="rotate(-25 200 195)"/>
    <ellipse cx="200" cy="195" rx="120" ry="183" transform="rotate(15 200 195)"/>
    <ellipse cx="200" cy="195" rx="120" ry="183" transform="rotate(-15 200 195)"/>
  </g>

  <!-- Subtle highlight -->
  <ellipse cx="150" cy="135" rx="80" ry="60" fill="white" opacity="0.02"/>

  <!-- Orbit ring -->
  <ellipse cx="200" cy="195" rx="193" ry="45" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.6" transform="rotate(-20 200 195)"/>

  <!-- Paris city marker -->
  <g opacity="0.8">
    <circle cx="160" cy="160" r="3" fill="#38bdf8"/>
    <circle cx="160" cy="160" r="6" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.5"/>
    <text x="148" y="152" fill="#38bdf8" font-family="'Space Grotesk',sans-serif" font-size="9" font-weight="600" opacity="0.7">FR</text>
  </g>

  <!-- Chisinau city marker -->
  <g opacity="0.8">
    <circle cx="257" cy="182" r="2.5" fill="#2dd4bf"/>
    <circle cx="257" cy="182" r="5.5" fill="none" stroke="#2dd4bf" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="130" cy="210" r="1.5" fill="#3b6a9b" opacity="0.3"/>
  <circle cx="270" cy="150" r="1.5" fill="#3b6a9b" opacity="0.3"/>
  <circle cx="240" cy="250" r="1" fill="#3b6a9b" opacity="0.25"/>
  <circle cx="170" cy="240" r="1" fill="#3b6a9b" opacity="0.25"/>

  <!-- MG Text -->
  <text x="195" y="445" fill="url(#grad-mg)" font-family="'Space Grotesk',sans-serif" font-size="72" font-weight="800" letter-spacing="-2" text-anchor="end">M</text>
  <text x="205" y="445" fill="url(#grad-mg)" font-family="'Space Grotesk',sans-serif" font-size="72" font-weight="800" letter-spacing="-2">G</text>
</svg>
